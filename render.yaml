services:
  - type: web
    name: omni-app
    env: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    autoDeploy: true
  - type: pserv
    name: omni-postgres
    env: docker
    plan: free
    repo: https://hub.docker.com/r/postgres
    envVars:
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: omni
